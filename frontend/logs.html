<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Bot — Logs</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="logo">
            <img src="/static/logo.svg" alt="Binance Bot" style="width:160px;margin-bottom:4px;">
        </div>
        <a href="/"           class="nav-item"><span class="icon">&#9635;</span> Dashboard</a>
        <a href="/orders"     class="nav-item"><span class="icon">&#8645;</span> Orders</a>
        <a href="/strategies" class="nav-item"><span class="icon">&#9881;</span> Strategies</a>
        <a href="/logs"       class="nav-item active"><span class="icon">&#9776;</span> Logs</a>
    </aside>

    <main class="main">
        <h2 style="margin-bottom:24px;">Live Logs</h2>

        <div class="card">
            <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
                bot.log — Live Stream
                <div class="flex gap-8">
                    <button class="btn btn-outline" id="toggle-scroll" style="padding:6px 14px;font-size:12px;">
                        Auto-scroll ON
                    </button>
                    <button class="btn btn-outline" id="clear-logs" style="padding:6px 14px;font-size:12px;">
                        Clear
                    </button>
                </div>
            </div>

            <div class="flex gap-8" style="margin-bottom:12px;">
                <button class="btn btn-outline" onclick="filterLogs('ALL')"      style="padding:5px 12px;font-size:11px;">ALL</button>
                <button class="btn btn-outline" onclick="filterLogs('INFO')"     style="padding:5px 12px;font-size:11px;color:var(--green);">INFO</button>
                <button class="btn btn-outline" onclick="filterLogs('WARNING')"  style="padding:5px 12px;font-size:11px;color:var(--yellow);">WARNING</button>
                <button class="btn btn-outline" onclick="filterLogs('ERROR')"    style="padding:5px 12px;font-size:11px;color:var(--red);">ERROR</button>
                <button class="btn btn-outline" onclick="filterLogs('CRITICAL')" style="padding:5px 12px;font-size:11px;color:var(--red);font-weight:700;">CRITICAL</button>
            </div>

            <div class="log-box" id="log-box"></div>
        </div>

        <div class="card">
            <div class="card-title">Log Level Legend</div>
            <div class="flex gap-16" style="flex-wrap:wrap;">
                <span class="text-muted"  style="font-size:12px;">&#9632; DEBUG — Internal state</span>
                <span class="text-green"  style="font-size:12px;">&#9632; INFO — Successful actions</span>
                <span class="text-yellow" style="font-size:12px;">&#9632; WARNING — Partial issues</span>
                <span class="text-red"    style="font-size:12px;">&#9632; ERROR — Failed operations</span>
                <span class="text-red"    style="font-size:12px;font-weight:700;">&#9632; CRITICAL — Fatal errors</span>
            </div>
        </div>
    </main>
</div>

<div class="toast" id="toast"></div>
<script src="/static/js/api.js"></script>
<script src="/static/js/logs.js"></script>
<script>
    let activeFilter = "ALL";

    function filterLogs(level) {
        activeFilter    = level;
        const box       = document.getElementById("log-box");
        const lines     = box.querySelectorAll(".log-line");
        lines.forEach(line => {
            line.style.display = (level === "ALL" || line.classList.contains(level))
                ? "block" : "none";
        });
    }
</script>
</body>
</html>
